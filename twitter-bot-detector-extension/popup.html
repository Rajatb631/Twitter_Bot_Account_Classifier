<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Twitter/X Bot Detector</title>
    <style>
      :root {
        --bg: #0f172a;
        --card-bg: rgba(2, 6, 23, 0.92);
        --accent-human: #16a34a;
        --accent-bot: #dc2626;
        --accent-suspicious: #eab308;
        --text-main: #e5e7eb;
        --text-muted: #9ca3af;
        --border-subtle: #1f2937;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 14px 16px 16px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: radial-gradient(circle at top, #1f2937, #020617 60%);
        color: var(--text-main);
        width: 360px;
      }

      .top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .brand-icon {
        width: 22px;
        height: 22px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 40% 0%, #1d4ed8, #020617 60%);
        font-size: 16px;
      }

      .title {
        font-size: 17px;
        font-weight: 600;
      }

      .badge {
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 999px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        background: rgba(148, 163, 184, 0.18);
        color: var(--text-muted);
        border: 1px solid rgba(148, 163, 184, 0.35);
      }

      .card {
        background: var(--card-bg);
        border-radius: 14px;
        border: 1px solid rgba(15, 23, 42, 0.9);
        padding: 10px 12px 12px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(14px);
      }

      .hidden {
        display: none;
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
      }

      .handle {
        font-weight: 600;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .handle-prefix {
        font-size: 12px;
        color: var(--text-muted);
      }

      .chip {
        font-size: 11px;
        padding: 3px 9px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-weight: 500;
        border: 1px solid transparent;
      }

      .chip span {
        font-size: 13px;
      }

      .chip-human {
        background: rgba(22, 163, 74, 0.12);
        color: #bbf7d0;
        border-color: rgba(34, 197, 94, 0.4);
      }

      .chip-bot {
        background: rgba(220, 38, 38, 0.12);
        color: #fecaca;
        border-color: rgba(248, 113, 113, 0.4);
      }

      .chip-suspicious {
        background: rgba(234, 179, 8, 0.12);
        color: #fef9c3;
        border-color: rgba(250, 204, 21, 0.4);
      }

      .prob-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 6px;
      }

      .prob-value {
        font-weight: 750;
        color: var(--text-main);
      }

      .prob-bar-wrap {
        margin-top: 6px;
        width: 100%;
        height: 7px;
        border-radius: 999px;
        background: #020617;
        border: 1px solid #111827;
        overflow: hidden;
      }

      .prob-bar-inner {
        height: 100%;
        width: 0%;
        border-radius: inherit;
        transition: width 0.4s ease;
      }

      .divider {
        margin-top: 10px;
        border-top: 1px solid rgba(31, 41, 55, 0.9);
      }

      .section-title {
        margin-top: 8px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
      }

      .section-body {
        font-size: 12px;
        margin-top: 3px;
        color: #e5e7eb;
        line-height: 1.4;
        max-height: 80px;
        overflow: auto;
      }

      #status {
        font-size: 13px;
        color: var(--text-muted);
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <div class="top-bar">
      <div class="brand">
        <div class="brand-icon">X</div>
        <div class="title">Bot Detector</div>
      </div>
      <div class="badge">Beta</div>
    </div>

    <div id="status">Click the + button next to a username on X.</div>

    <div id="card" class="card hidden">
      <div class="row">
        <div class="handle">
          <span class="handle-prefix">@</span>
          <span id="username">user</span>
        </div>
        <div class="chip" id="labelChip">
          <span>🤖</span>
          <span id="labelText">Bot</span>
        </div>
      </div>

      <div class="prob-row">
        <span>Estimated human probability</span>
        <span class="prob-value" id="probText">0%</span>
      </div>
      <div class="prob-bar-wrap">
        <div class="prob-bar-inner" id="probBar"></div>
      </div>

      <div class="divider"></div>

      <div class="section-title">Bio</div>
      <div class="section-body" id="bioText">–</div>

      <div class="section-title">Tweet</div>
      <div class="section-body" id="tweetText">–</div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
